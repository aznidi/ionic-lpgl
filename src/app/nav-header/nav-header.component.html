<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ title }}</ion-title>

    <ion-buttons slot="end">
      @for (item of items; track item.path) {
        <ion-button
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ item.label }}
        </ion-button>
      }
    </ion-buttons>
  </ion-toolbar>
</ion-header>
