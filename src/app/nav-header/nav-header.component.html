<ion-header class="nav-header" [translucent]="true">
  <ion-toolbar>
    <div class="nav-bar">
      <div class="brand">
        <div class="brand__text">
          <div class="brand__page">{{ title }}</div>
        </div>
      </div>

      <div class="nav-links">
        @for (item of items; track item.path) {
          <ion-button
            fill="clear"
            class="nav-link"
            [routerLink]="item.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            {{ item.label }}
          </ion-button>
        }
      </div>
    </div>
  </ion-toolbar>
</ion-header>
